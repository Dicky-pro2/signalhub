<svg width="240" height="260" viewBox="0 0 240 260" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Gradients -->
  <defs>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFA733"/>
      <stop offset="100%" stop-color="#FF6A00"/>
    </linearGradient>

    <linearGradient id="lightGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFD8A8"/>
    </linearGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- WIFI SIGNAL -->
  <path d="M70 40 Q120 5 170 40" stroke="url(#orangeGrad)" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M85 55 Q120 25 155 55" stroke="url(#orangeGrad)" stroke-width="6" stroke-linecap="round" fill="none"/>
  <circle cx="120" cy="70" r="5" fill="#FF8C00"/>

  <!-- STORE BODY -->
  <g filter="url(#shadow)">
    <rect x="40" y="90" width="160" height="100" rx="18" fill="url(#lightGrad)"/>
  </g>

  <!-- AWNING TOP -->
  <rect x="40" y="80" width="160" height="25" rx="10" fill="url(#orangeGrad)"/>

  <!-- AWNING STRIPES -->
  <path d="M40 105 Q55 80 70 105 Z" fill="#FFFFFF"/>
  <path d="M70 105 Q85 80 100 105 Z" fill="#FF8C00"/>
  <path d="M100 105 Q115 80 130 105 Z" fill="#FFFFFF"/>
  <path d="M130 105 Q145 80 160 105 Z" fill="#FF8C00"/>
  <path d="M160 105 Q175 80 200 105 Z" fill="#FFFFFF"/>

  <!-- LEFT ICON (BAG) -->
  <rect x="65" y="120" width="20" height="25" rx="4" fill="#FF8C00"/>
  <path d="M70 120 Q75 110 80 120" stroke="white" stroke-width="2" fill="none"/>

  <!-- RIGHT ICON (CLIPBOARD) -->
  <rect x="155" y="120" width="20" height="30" rx="4" fill="#FF8C00"/>
  <line x1="160" y1="130" x2="170" y2="130" stroke="white" stroke-width="2"/>
  <line x1="160" y1="136" x2="170" y2="136" stroke="white" stroke-width="2"/>

  <!-- CHART (CENTER) -->
  <rect x="95" y="135" width="8" height="20" rx="2" fill="#FF8C00"/>
  <rect x="108" y="125" width="8" height="30" rx="2" fill="#FF8C00"/>
  <rect x="121" y="130" width="8" height="25" rx="2" fill="#FF8C00"/>
  <rect x="134" y="120" width="8" height="35" rx="2" fill="#FF8C00"/>

  <!-- TEXT -->
  <text x="120" y="220" text-anchor="middle" font-size="26" font-weight="700"
        font-family="Segoe UI, Arial, sans-serif" fill="#FF7A00">
    SignalHub
  </text>

  <text x="120" y="245" text-anchor="middle" font-size="14"
        font-family="Segoe UI, Arial, sans-serif" fill="#888888">
    Signals Marketplace
  </text>

</svg>